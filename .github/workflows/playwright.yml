name: SentinelQA Test Suite
on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install dependencies
        run: npm install && npx playwright install --with-deps
      - name: Run Playwright tests
        run: npx playwright test
      
      # Sends res to n8n webhook
      - name: Notify SentinelQA on Failure
        if: failure()
        run: |
          curl -X POST "${{ secrets.N8N_WEBHOOK_URL }}" \
          -H "Content-Type: application/json" \
          -H "X-Hub-Signature-256: ${{ secrets.N8N_WEBHOOK_SECRET }}" \
          -d '{
            "event": "workflow_run_failure",
            "repository": { "full_name": "${{ github.repository }}" },
            "workflow_run": { "id": "${{ github.run_id }}" }
          }'